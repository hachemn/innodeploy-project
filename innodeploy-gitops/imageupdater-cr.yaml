apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: innodeploy-updater
  namespace: argocd
spec:
  commonUpdateSettings:
    updateStrategy: semver
    allowTags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      repository: "https://github.com/hachemn/innodeploy-gitops.git"
      branch: "main"
      writeBackTarget: "kustomization:."
  applicationRefs:
    - namePattern: "innodeploy-app"
      images:
        - alias: "app"
          imageName: "nourhenhachem/innodeploy-app"
          manifestTargets:
            kustomize:
              name: "nourhenhachem/innodeploy-app"
